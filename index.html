<!DOCTYPE html>
<html>

<head>
    <title>Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <h2>Escanear producto</h2>
    <button onclick="startScanner()">Escanear</button>

    <div id="reader" style="width:300px; margin-top:20px;"></div>

    <pre id="log"></pre>

    <script>
        const API_URL = "https://invadable-chasidy-fleshly.ngrok-free.dev/products";

        function log(msg) {
            document.getElementById("log").innerText += msg + "\n";
        }

        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");

            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    let cameraId = devices.find(device =>
                        device.label.toLowerCase().includes('back') ||
                        device.label.toLowerCase().includes('rear')
                    )?.id || devices[0].id;

                    html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: 250 },
                        (decodedText) => {
                            log("SCAN: " + decodedText);

                            fetch(`${API_URL}/${decodedText}`, {
                                method: "POST"
                            })
                                .then(res => res.json())
                                .then(data => {
                                    log("RESPUESTA: " + JSON.stringify(data));
                                })
                                .catch(err => log("ERROR: " + err));

                            html5QrCode.stop();
                        }
                    );
                }
            }).catch(err => {
                log("ERROR CAMARA: " + err);
            });
        }
    </script>

</body>

</html>
