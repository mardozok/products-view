<!DOCTYPE html>
<html>

<head>
    <title>Escáner de Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
        }

        #reader {
            width: 300px;
            margin: auto;
            margin-top: 20px;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2>📷 Escanear precio</h2>

    <button onclick="iniciarScanner()">Escanear código</button>

    <div id="reader"></div>
    <div id="resultado">Esperando acción:...</div>

    <script>
        const API_URL = "https://abcd1234.ngrok.io/products";// 🔥 cambiá por la IP de tu backend

        let scanner;

        function iniciarScanner() {
            document.getElementById("resultado").innerText = "Abriendo cámara...";

            scanner = new Html5Qrcode("reader");

            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                onScanSuccess
            );
        }

        function onScanSuccess(code) {
            document.getElementById("resultado").innerText = "Buscando...";

            scanner.stop().catch(() => { });

            fetch(API_URL + "/" + code, { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("resultado").innerHTML =
                        `<b>${data.name}</b><br>💲 $${data.price}`;
                })
                .catch(() => {
                    document.getElementById("resultado").innerText = "❌ Producto no encontrado";
                });
        }
    </script>

</body>

</html>
