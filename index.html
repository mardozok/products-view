<!DOCTYPE html>
<html lang="es">

<head>

    <title>Scanner now</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="code/index.js"></script>
    <script type="module" src="code/scanner.js"></script>
</head>

<body>

    <!-- 🔝 HEADER FIJO -->

        <div class="products">

        </div>

        </div>

    </div>
